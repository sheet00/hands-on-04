AWSTemplateFormatVersion: '2010-09-09'
Description: Hands-on 04 step 05 ECS service stack

Parameters:
  ProjectName:
    Type: String
    Default: handson-04
  NetworkStackName:
    Type: String
    Default: handson-04-network
  SecurityStackName:
    Type: String
    Default: handson-04-security
  AlbStackName:
    Type: String
    Default: handson-04-alb
  EcsBaseStackName:
    Type: String
    Default: handson-04-ecs-base
  ContainerPort:
    Type: Number
    Default: 3000
  DesiredCount:
    Type: Number
    Default: 1
  EcrImageUri:
    Type: String
    Default: public.ecr.aws/o7b9y7i7/handson-04-repo:latest
  BedrockApiKey:
    Type: String
    NoEcho: true
  BedrockModelId:
    Type: String
    Default: amazon.nova-micro-v1:0
  BedrockRegion:
    Type: String
    Default: us-east-1

Resources:
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-task
      Cpu: 256
      Memory: 512
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !ImportValue
        Fn::Sub: ${EcsBaseStackName}-ExecutionRoleArn
      TaskRoleArn: !ImportValue
        Fn::Sub: ${EcsBaseStackName}-TaskRoleArn
      ContainerDefinitions:
        - Name: web
          Image: !Ref EcrImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: !Sub '${ContainerPort}'
            - Name: AWS_BEARER_TOKEN_BEDROCK
              Value: !Ref BedrockApiKey
            - Name: BEDROCK_MODEL_ID
              Value: !Ref BedrockModelId
            - Name: AWS_REGION
              Value: !Ref BedrockRegion
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !ImportValue
                Fn::Sub: ${EcsBaseStackName}-LogGroupName
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  EcsService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub ${ProjectName}-service
      Cluster: !ImportValue
        Fn::Sub: ${EcsBaseStackName}-ClusterName
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      TaskDefinition: !Ref TaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !ImportValue
              Fn::Sub: ${SecurityStackName}-EcsSecurityGroupId
          Subnets:
            - !ImportValue
              Fn::Sub: ${NetworkStackName}-PublicSubnet1Id
            - !ImportValue
              Fn::Sub: ${NetworkStackName}-PublicSubnet2Id
      LoadBalancers:
        - ContainerName: web
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !ImportValue
            Fn::Sub: ${AlbStackName}-TargetGroupArn

Outputs:
  TaskDefinitionArn:
    Value: !Ref TaskDefinition
    Export:
      Name: !Sub ${AWS::StackName}-TaskDefinitionArn
  ServiceName:
    Value: !GetAtt EcsService.Name
    Export:
      Name: !Sub ${AWS::StackName}-ServiceName
