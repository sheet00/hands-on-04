<!DOCTYPE html>
<html lang="ja" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Bedrock Hands-on</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/vendor/daisyui/daisyui.css">
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <main class="shell">
        <section class="hero card shadow-2xl">
            <div class="hero-body">
                <div class="hero-copy">
                    <p class="eyebrow">AWS Hands-on 04</p>
                    <h1>Amazon Bedrock Playground</h1>
                    <p class="lead">
                        Claude に送るプロンプトを入力して、Bedrock 連携を試すためのシンプルな画面です。
                    </p>
                </div>
            </div>
        </section>

        <section class="workspace">
            <div class="card panel shadow-xl">
                <div class="card-body">
                    <div class="section-head">
                        <div>
                            <p class="eyebrow">Prompt</p>
                            <h2>Claude に聞く内容</h2>
                        </div>
                        <span class="badge badge-warning badge-soft">未接続</span>
                    </div>
                    <p class="input-caption">プロンプト</p>
                    <textarea id="prompt" class="textarea textarea-bordered prompt-box"
                        placeholder="例: CloudFront と ALB の役割の違いを教えて"></textarea>
                    <div class="action-row">
                        <button id="send-button" class="btn btn-primary btn-wide" type="button">送信</button>
                    </div>
                </div>
            </div>

            <div class="card panel shadow-xl result-panel">
                <div class="card-body">
                    <div class="section-head">
                        <div>
                            <p class="eyebrow">Output</p>
                            <h2>レスポンス</h2>
                        </div>
                        <span class="badge badge-info badge-soft">Preview</span>
                    </div>
                    <div id="result" class="result-box"></div>
                    <p id="status-line" class="result-status">UI ready. API integration pending.</p>
                </div>
            </div>
        </section>
    </main>
    <script src="/app.js"></script>
</body>

</html>
