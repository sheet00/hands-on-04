<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Bedrock Hands-on</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; }
        button { padding: 10px 20px; background-color: #232f3e; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #3b4d61; }
        #result { margin-top: 20px; padding: 15px; background: #f4f4f4; border-radius: 4px; white-space: pre-wrap; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <h1>Amazon Bedrock Hands-on</h1>
    <p>Claudeに何か聞いてみよう！</p>
    <textarea id="prompt" placeholder="例: AWS CloudFrontとは何ですか？"></textarea>
    <button onclick="askBedrock()">送信</button>

    <div id="result">結果がここに表示されます</div>

    <script>
        async function askBedrock() {
            const prompt = document.getElementById('prompt').value;
            const resultDiv = document.getElementById('result');
            
            if (!prompt) return alert('プロンプトを入力してください');

            resultDiv.innerText = '考え中...';
            resultDiv.classList.add('loading');

            try {
                const response = await fetch('/api/bedrock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                const data = await response.json();
                if (data.error) {
                    resultDiv.innerText = 'エラー: ' + data.error;
                } else {
                    resultDiv.innerText = data.response;
                }
            } catch (err) {
                resultDiv.innerText = '通信エラーが発生しました';
            } finally {
                resultDiv.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
