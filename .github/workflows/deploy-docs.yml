name: Deploy Marp slides to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'doc/handson-marp.md'
      - '.github/workflows/deploy-docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Marp Slide
        uses: marp-team/marp-cli-github-action@v1.3.0
        with:
          args: doc/handson-marp.md -o index.html
        env:
          MARP_USER: root:root

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
